name: Ansible CI

on:
  pull_request:
    paths:
      - "playbooks/**/*.yml"
      - "playbooks/**/*.yaml"
      - ".github/workflows/ansible-ci.yml"
  push:
    branches:
      - main
    paths:
      - "playbooks/**/*.yml"
      - "playbooks/**/*.yaml"
      - ".github/workflows/ansible-ci.yml"

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible-core

      - name: Create test inventory
        run: |
          cat <<'EOF' > ci-inventory.ini
          [all]
          localhost ansible_connection=local

          [web]
          localhost ansible_connection=local
          EOF

      - name: Validate playbook syntax
        run: |
          ansible-playbook -i ci-inventory.ini --syntax-check playbooks/ping.yml
          ansible-playbook -i ci-inventory.ini --syntax-check playbooks/install-nginx.yml
