name: Ansible CI

on:
  pull_request:
    paths:
      - "playbooks/**/*.yml"
      - "playbooks/**/*.yaml"
      - ".github/workflows/ansible-ci.yml"
  push:
    branches:
      - main
    paths:
      - "playbooks/**/*.yml"
      - "playbooks/**/*.yaml"
      - ".github/workflows/ansible-ci.yml"

jobs:
  run-playbooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ansible and ansible-lint
        run: pip install ansible-core ansible-lint safety

      - name: Lint playbooks
        run: |
          ansible-lint playbooks/ --parseable --quiet > ansible-lint-report.txt || true
          ansible-lint playbooks/ --format json > ansible-lint-report.json || true

      - name: Security scan dependencies
        run: |
          safety check --json > security-report.json || true
          safety check > security-report.txt || true

      - name: Security scan playbooks
        run: |
          ansible-lint playbooks/ --parseable-severity --force-color --rules-dir /dev/null \
            --enable-list=risky,no-same-owner,package-latest,command-instead-of-shell,ignore-errors \
            > ansible-security-report.txt || true
          echo "Ansible security scan completed"

      - name: Upload code quality reports
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            ansible-lint-report.txt
            ansible-lint-report.json
          retention-days: 30

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            security-report.txt
            security-report.json
            ansible-security-report.txt
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## Code Quality & Security Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Code Quality Reports" >> $GITHUB_STEP_SUMMARY
          echo "- ansible-lint report: \`ansible-lint-report.txt\` and \`ansible-lint-report.json\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Reports" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency security scan: \`security-report.txt\` and \`security-report.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ansible security scan: \`ansible-security-report.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reports have been uploaded as artifacts for detailed review." >> $GITHUB_STEP_SUMMARY

      - name: Create test inventory
        run: |
          cat <<'EOF' > ci-inventory.ini
          [all]
          localhost ansible_connection=local

          [web]
          localhost ansible_connection=local
          EOF

      - name: Run ping playbook
        run: |
          ansible-playbook -i ci-inventory.ini playbooks/ping.yml

      - name: Run nginx install playbook
        run: |
          ansible-playbook -i ci-inventory.ini playbooks/install-nginx.yml --become

  sample-failing-job:
    runs-on: ubuntu-latest

    steps:
      - name: Sample job for fix-pipeline testing
        run: |
          echo "PIPELINE_TEST_SUCCESS: sample job now passes after /fix-pipeline fix"
